<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .slide-container { width: 1280px; min-height: 720px; background: #F4F0E8; color: #111111; font-family: 'Space Grotesk', sans-serif; }
    .inner { padding: 74px 92px 0 92px; }
    .eyebrow { font-size: 13px; text-transform: uppercase; letter-spacing: 0.2em; color: #3F4752; }
    .page { float: right; font-size: 18px; color: #3F4752; }
    .stack { margin-top: 80px; width: 960px; }
    .line { font-size: 78px; line-height: 0.95; letter-spacing: -0.08em; margin-bottom: 18px; }
    .line span { display: inline-block; border-left: 6px solid #2D6CDF; padding-left: 22px; }
    .closing { margin-top: 46px; width: 760px; font-size: 26px; line-height: 1.42; color: #3F4752; }
  </style>
</head>
<body>
  <div class="slide-container">
    <div class="inner">
      <div class="page">12</div>
      <div class="eyebrow">What you can expect</div>
      <div class="stack">
        <div class="line"><span>No vague proposals.</span></div>
        <div class="line"><span>No mystery pricing.</span></div>
        <div class="line"><span>No agency runaround.</span></div>
      </div>
      <div class="closing">You get a clearer website, a stronger first impression, and a simpler path to better calls without being dragged through agency fog first.</div>
    </div>
  </div>
</body>
</html>
